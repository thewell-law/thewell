name: Data correction
description: Report an error in an existing judge or court record.
title: "[correction] "
labels: ["data-correction"]
body:
  - type: markdown
    attributes:
      value: |
        Corrections without citations may still be accepted, but they take longer to verify. Include a primary source if you can.
  - type: input
    id: page
    attributes:
      label: Judge URL on our site
      description: e.g., https://thewell.law/j/casd/jane-doe
    validations:
      required: true
  - type: input
    id: field
    attributes:
      label: Field that is wrong
      description: e.g., page_limits.reply_brief, standing_order.url, chambers.phone_policy
    validations:
      required: true
  - type: textarea
    id: correct
    attributes:
      label: Correct value
    validations:
      required: true
  - type: textarea
    id: citation
    attributes:
      label: Source citation
      description: Primary sources strongly preferred (published order, docket entry, official calendar, etc.).
    validations:
      required: true

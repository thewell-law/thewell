name: Jurisdiction request
description: Ask for a court we don't yet cover.
title: "[jurisdiction] "
labels: ["jurisdiction"]
body:
  - type: input
    id: court
    attributes:
      label: Court name
      description: e.g., California Superior Court, Santa Clara County
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Court URL
    validations:
      required: true
  - type: input
    id: judges
    attributes:
      label: Approximate number of judges
    validations:
      required: true
  - type: dropdown
    id: volunteer
    attributes:
      label: Are you willing to help build this extractor?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

name: Extractor bug
description: A scraper produced wrong or missing output.
title: "[extractor] "
labels: ["bug", "scrapers"]
body:
  - type: input
    id: jurisdiction
    attributes:
      label: Jurisdiction
      description: e.g., casd, cand, la-superior
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Judge slug
      description: The judge identifier under data/, e.g., jane-doe
    validations:
      required: true
  - type: input
    id: field
    attributes:
      label: Field that failed to extract
      description: e.g., page_limits.motion_in_limine
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected value
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Link to source PDF
      description: URL of the upstream document the extractor was parsing.
    validations:
      required: true
